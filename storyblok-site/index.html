<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sherpa Capital Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/sherpa.css">
<!-- Storyblok Bridge for Visual Editor -->
<script src="https://app.storyblok.com/f/storyblok-v2-latest.js"></script>
<script>
  const storyblokInstance = new StoryblokBridge();
  storyblokInstance.on('input', (event) => {
    // Re-render on live edit
    if (event.story) renderPage(event.story);
  });
  storyblokInstance.on('published', () => location.reload());
  storyblokInstance.on('change', () => location.reload());
</script>
</head>
<body>
<div id="app"></div>
<script src="/js/renderer.js"></script>
</body>
</html>
